<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Outer orange ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#f65003" stroke-width="22"/>
  <!-- Inner orange ring -->
  <circle cx="250" cy="250" r="175" fill="none" stroke="#f65003" stroke-width="16"/>
  
  <!-- Blue truck icon -->
  <g transform="translate(175, 140)" fill="#088ee8">
    <!-- Speed lines -->
    <rect x="0" y="22" width="35" height="5" rx="2.5"/>
    <rect x="10" y="35" width="30" height="5" rx="2.5"/>
    <rect x="5" y="48" width="35" height="5" rx="2.5"/>
    <rect x="15" y="61" width="25" height="5" rx="2.5"/>
    <!-- Truck body -->
    <rect x="40" y="10" width="60" height="55" rx="4" fill="none" stroke="#088ee8" stroke-width="6" stroke-dasharray="6,0"/>
    <!-- Truck body top dashes -->
    <rect x="44" y="6" width="8" height="5" rx="1"/>
    <rect x="56" y="6" width="8" height="5" rx="1"/>
    <rect x="68" y="6" width="8" height="5" rx="1"/>
    <rect x="80" y="6" width="8" height="5" rx="1"/>
    <!-- Truck cabin -->
    <path d="M100,25 L100,65 L135,65 L135,45 L120,25 Z" fill="none" stroke="#088ee8" stroke-width="6" stroke-linejoin="round"/>
    <!-- Truck window -->
    <path d="M108,32 L118,32 L128,48 L108,48 Z" fill="#088ee8"/>
    <!-- Wheels -->
    <circle cx="65" cy="72" r="9" fill="none" stroke="#088ee8" stroke-width="5"/>
    <circle cx="120" cy="72" r="9" fill="none" stroke="#088ee8" stroke-width="5"/>
  </g>
  
  <!-- OMNI text in white -->
  <text x="250" y="290" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="12">OMNI</text>
  
  <!-- NEXT LEVEL DELIVERIES text in white -->
  <text x="250" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="18" fill="#ffffff" letter-spacing="3">NEXT LEVEL DELIVERIES</text>
</svg>
